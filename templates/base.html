<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico/favicon.ico') }}">
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <title>FMV | Sistema de Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico/favicon.ico') }}">
    
</head>


<script>
document.addEventListener("DOMContentLoaded", () => {
    document.body.style.opacity = 0;
    setTimeout(() => {
        document.body.style.transition = "opacity 0.5s";
        document.body.style.opacity = 1;
    }, 100);
});
</script>

<script>
window.onload = () => {
    document.body.style.opacity = 1;
};
</script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 50 },
    color: { value: "#e60000" },
    shape: { type: "circle" },
    opacity: { value: 0.2 },
    size: { value: 3 },
    move: { enable: true, speed: 1 }
  }
});
</script>

<script>
document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", e => {
        if (link.href.includes(window.location.origin)) {
            e.preventDefault();
            document.body.style.opacity = 0;

            setTimeout(() => {
                window.location = link.href;
            }, 300);
        }
    });
});

window.onload = () => {
    document.body.style.opacity = 1;
};
</script>

<script>
function showToast(msg) {
    let toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.opacity = 1;

    setTimeout(() => {
        toast.style.opacity = 0;
    }, 3000);
}
</script>

<div id="loader">
    <div class="loader-content">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="logo">
        <div class="spinner"></div>
        <p>Cargando sistema...</p>
    </div>
</div>

<script>
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loader").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("loader").style.display = "none";
        }, 500);
    }, 100); // tiempo visible del loader
});
</script>

<script>
function cambiarTema() {
    document.body.classList.toggle("light-mode");

    // guardar preferencia
    if(document.body.classList.contains("light-mode")){
        localStorage.setItem("tema", "light");
    } else {
        localStorage.setItem("tema", "dark");
    }
}

// cargar tema guardado
window.onload = function() {
    if(localStorage.getItem("tema") === "light"){
        document.body.classList.add("light-mode");
    }
}
</script>

<script>
function aplicarTema(tema) {
    const btn = document.getElementById("btnTema");

    if (tema === "light") {
        document.body.classList.add("light-mode");
        btn.innerHTML = "☀️";
    } else {
        document.body.classList.remove("light-mode");
        btn.innerHTML = "🌙";
    }
}

function cambiarTema() {
    let temaActual = localStorage.getItem("tema");

    if (temaActual === "light") {
        localStorage.setItem("tema", "dark");
        aplicarTema("dark");
    } else {
        localStorage.setItem("tema", "light");
        aplicarTema("light");
    }
}

// 🔥 DETECTAR SISTEMA AUTOMÁTICO
window.onload = function () {
    let temaGuardado = localStorage.getItem("tema");

    if (!temaGuardado) {
        // detectar sistema
        if (window.matchMedia("(prefers-color-scheme: light)").matches) {
            temaGuardado = "light";
        } else {
            temaGuardado = "dark";
        }
    }

    aplicarTema(temaGuardado);
};
</script>

<body>

    <script>
    showToast("Bienvenido al sistema FMV 🔥");
    </script>
    <div id="toast"></div>
    <div id="particles-js"></div>


{% if session.get("user") %}
<div class="container">

    <aside class="sidebar">


    

    <div class="logo">
        <img src="{{ url_for('static', filename='img/logo.png') }}">
        <h2>FMV</h2>
    </div>

    <button class="toggle-menu" onclick="toggleMenu()">☰</button>
    <nav>
        <a href="/dashboard" class="menu-item {% if request.path == '/dashboard' %}activo{% endif %}">
            🏠 <span>Dashboard</span>
        </a>
        <a href="/clientes" class="menu-item {% if request.path == '/clientes' %}activo{% endif %}">
            👥 <span>Clientes</span>
        </a>
        <a href="/calendario" class="menu-item {% if request.path == '/calendario' %}activo{% endif %}">
            📅 <span>Calendario</span>
        </a>
        <a href="/ordenes" class="menu-item {% if request.path == '/ordenes' %}activo{% endif %}">
            📄 <span>Órdenes</span>
        </a>

        {% if session.get("rol") == "admin" %}
        <a href="/usuarios" class="menu-item {% if request.path == '/usuarios' %}activo{% endif %}">
            ⚙️ <span>Usuarios</span>
        </a>
        {% endif %}

        <a href="/logout" class="menu-item salir">🚪 <span>Salir</span></a>
    </nav>

    </aside>

    <main class="content">
{% endif %}

<script>
function toggleMenu() {
    document.querySelector(".sidebar").classList.toggle("cerrado");
}
</script>
        {% block content %}{% endblock %}

{% if session.get("user") %}
    </main>
</div>
{% endif %}

</body>

<button onclick="cambiarTema()" class="theme-toggle" id="btnTema">🌙</button>

</html>
